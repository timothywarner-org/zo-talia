  <!-- Eyes - confident half-lidded -->
  <ellipse cx="110" cy="185" rx="15" ry="8" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="115" cy="185" r="5" fill="#c62828"/>
  <ellipse cx="190" cy="185" rx="15" ry="8" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="195" cy="185" r="5" fill="#c62828"/>
  <!-- Smug eyebrows raised -->
  <line x1="88" y1="168" x2="132" y2="162" stroke="#444" stroke-width="3"/>
  <line x1="168" y1="162" x2="212" y2="168" stroke="#444" stroke-width="3"/>
  <!-- Smirk -->
  <path d="M120 235 Q150 255 180 230" stroke="#444" stroke-width="3" fill="none"/>

  <polygon points="230,100 235,110 245,112 237,118 239,128 230,122 221,128 223,118 215,112 225,110" fill="#ffd600" opacity="0.8"/>
  <polygon points="70,90 73,97 80,98 75,102 76,109 70,105 64,109 65,102 60,98 67,97" fill="#ffd600" opacity="0.6"/>
  <!-- Light blush -->
  <ellipse cx="95" cy="210" rx="12" ry="8" fill="#ffcccc" opacity="0.3"/>
  <ellipse cx="205" cy="210" rx="12" ry="8" fill="#ffcccc" opacity="0.3"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>

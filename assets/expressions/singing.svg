<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: singing expression -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - closed contentedly -->
  <path d="M95 180 Q110 172 125 180" stroke="#444" stroke-width="3" fill="none"/>
  <path d="M175 180 Q190 172 205 180" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Mouth - open singing "o" shape -->
  <ellipse cx="150" cy="240" rx="18" ry="22" fill="#444"/>
  <!-- Music notes -->
  <text x="220" y="150" font-size="24" fill="#7b1fa2">&#9835;</text>
  <text x="240" y="130" font-size="18" fill="#7b1fa2">&#9834;</text>
  <text x="70" y="145" font-size="20" fill="#7b1fa2">&#9834;</text>
  <!-- Light blush -->
  <ellipse cx="95" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.4"/>
  <ellipse cx="205" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.4"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

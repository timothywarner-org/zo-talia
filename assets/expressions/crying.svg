<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: crying expression -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - squeezed shut crying -->
  <path d="M95 180 Q110 190 125 180" stroke="#444" stroke-width="3" fill="none"/>
  <path d="M175 180 Q190 190 205 180" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Eyebrows - sad -->
  <path d="M88 162 Q110 170 132 165" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M168 165 Q190 170 212 162" stroke="#444" stroke-width="2" fill="none"/>
  <!-- Mouth - wobbling frown -->
  <path d="M120 245 Q135 240 150 248 Q165 240 180 245" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Tears -->
  <path d="M100 190 Q95 210 100 225" stroke="#64b5f6" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M105 225 L100 235 L110 235 Z" fill="#64b5f6" opacity="0.7"/>
  <path d="M200 190 Q205 210 200 225" stroke="#64b5f6" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M195 225 L200 235 L190 235 Z" fill="#64b5f6" opacity="0.7"/>
  <!-- Extra tear drops -->
  <ellipse cx="90" cy="240" rx="3" ry="4" fill="#64b5f6" opacity="0.5"/>
  <ellipse cx="210" cy="242" rx="3" ry="4" fill="#64b5f6" opacity="0.5"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: happy/default expression -->
  <!-- Hair -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <!-- Face -->
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - happy/closed (curved lines) -->
  <path d="M100 180 Q115 165 130 180" stroke="#444" stroke-width="3" fill="none"/>
  <path d="M170 180 Q185 165 200 180" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Mouth - big smile -->
  <path d="M110 230 Q150 270 190 230" stroke="#444" stroke-width="3" fill="#fff"/>
  <!-- Blush -->
  <ellipse cx="95" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.5"/>
  <ellipse cx="205" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.5"/>
  <!-- Uniform collar -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

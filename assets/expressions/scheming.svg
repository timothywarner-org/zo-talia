<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: scheming/evil grin expression -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - narrow and mischievous -->
  <ellipse cx="110" cy="182" rx="16" ry="10" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="114" cy="182" r="6" fill="#c62828"/>
  <circle cx="112" cy="180" r="2" fill="#fff"/>
  <ellipse cx="190" cy="182" rx="16" ry="10" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="194" cy="182" r="6" fill="#c62828"/>
  <circle cx="192" cy="180" r="2" fill="#fff"/>
  <!-- Eyebrows - one raised deviously -->
  <line x1="88" y1="165" x2="130" y2="160" stroke="#444" stroke-width="3"/>
  <path d="M170 158 Q190 150 212 160" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Evil grin -->
  <path d="M110 235 Q130 260 150 255 Q170 260 190 235" stroke="#444" stroke-width="3" fill="#fff"/>
  <!-- Dark aura lines -->
  <line x1="55" y1="140" x2="40" y2="130" stroke="#7b1fa2" stroke-width="2" opacity="0.5"/>
  <line x1="55" y1="160" x2="35" y2="160" stroke="#7b1fa2" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="180" x2="40" y2="190" stroke="#7b1fa2" stroke-width="2" opacity="0.3"/>
  <line x1="245" y1="140" x2="260" y2="130" stroke="#7b1fa2" stroke-width="2" opacity="0.5"/>
  <line x1="245" y1="160" x2="265" y2="160" stroke="#7b1fa2" stroke-width="2" opacity="0.4"/>
  <line x1="245" y1="180" x2="260" y2="190" stroke="#7b1fa2" stroke-width="2" opacity="0.3"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: shocked/surprised expression (hover state) -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - wide open shocked -->
  <ellipse cx="110" cy="180" rx="18" ry="20" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="110" cy="180" r="8" fill="#c62828"/>
  <circle cx="106" cy="176" r="3" fill="#fff"/>
  <ellipse cx="190" cy="180" rx="18" ry="20" fill="#fff" stroke="#444" stroke-width="2"/>
  <circle cx="190" cy="180" r="8" fill="#c62828"/>
  <circle cx="186" cy="176" r="3" fill="#fff"/>
  <!-- Eyebrows - raised high -->
  <path d="M88 150 Q110 138 132 150" stroke="#444" stroke-width="3" fill="none"/>
  <path d="M168 150 Q190 138 212 150" stroke="#444" stroke-width="3" fill="none"/>
  <!-- Mouth - small shocked "o" -->
  <ellipse cx="150" cy="245" rx="12" ry="15" fill="#444"/>
  <!-- Lightning bolts -->
  <polygon points="55,100 70,140 60,140 75,175 50,135 62,135" fill="#ffd600"/>
  <polygon points="245,100 230,140 240,140 225,175 250,135 238,135" fill="#ffd600"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

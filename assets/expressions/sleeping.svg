<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Prussia placeholder: sleeping expression -->
  <ellipse cx="150" cy="120" rx="120" ry="100" fill="#e0e0e0"/>
  <path d="M30 120 Q50 20 150 30 Q250 20 270 120" fill="#d0d0d0"/>
  <ellipse cx="150" cy="200" rx="100" ry="120" fill="#fce4c8"/>
  <!-- Eyes - closed peacefully -->
  <path d="M95 185 Q110 178 125 185" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M175 185 Q190 178 205 185" stroke="#444" stroke-width="2" fill="none"/>
  <!-- Mouth - tiny content smile -->
  <path d="M135 238 Q150 245 165 238" stroke="#444" stroke-width="2" fill="none"/>
  <!-- Zzz floating -->
  <text x="215" y="120" font-size="28" font-weight="bold" fill="#90caf9" opacity="0.9">Z</text>
  <text x="235" y="95" font-size="22" font-weight="bold" fill="#90caf9" opacity="0.7">z</text>
  <text x="248" y="75" font-size="16" font-weight="bold" fill="#90caf9" opacity="0.5">z</text>
  <!-- Sleep bubble -->
  <circle cx="230" cy="145" r="4" fill="#90caf9" opacity="0.3"/>
  <circle cx="222" cy="155" r="3" fill="#90caf9" opacity="0.3"/>
  <!-- Light blush -->
  <ellipse cx="95" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.3"/>
  <ellipse cx="205" cy="210" rx="15" ry="10" fill="#ffcccc" opacity="0.3"/>
  <!-- Uniform -->
  <path d="M70 310 L150 350 L230 310 L230 400 L70 400 Z" fill="#1a237e"/>
  <path d="M130 310 L150 350 L170 310" fill="#fff" stroke="#ccc" stroke-width="1"/>
</svg>

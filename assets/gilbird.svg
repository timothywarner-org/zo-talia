<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 50" width="60" height="50">
  <!-- Gilbird - Prussia's little yellow bird -->
  <!-- Body -->
  <ellipse cx="30" cy="30" rx="20" ry="16" fill="#ffeb3b"/>
  <!-- Head -->
  <circle cx="30" cy="16" r="12" fill="#ffeb3b"/>
  <!-- Eye -->
  <circle cx="34" cy="14" r="3" fill="#444"/>
  <circle cx="35" cy="13" r="1" fill="#fff"/>
  <!-- Beak -->
  <polygon points="42,16 50,14 42,18" fill="#ff9800"/>
  <!-- Wing -->
  <ellipse cx="20" cy="28" rx="12" ry="8" fill="#fdd835" transform="rotate(-15 20 28)"/>
  <!-- Tiny feet -->
  <line x1="24" y1="44" x2="22" y2="50" stroke="#ff9800" stroke-width="2"/>
  <line x1="36" y1="44" x2="38" y2="50" stroke="#ff9800" stroke-width="2"/>
</svg>

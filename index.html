<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prussia Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- START SCREEN -->
  <section id="start-screen">
    <h1 class="title">Prussia Game</h1>
    <button id="start-btn" type="button">START</button>
    <p class="attribution">Created by Catsalot & BDD</p>
  </section>

  <!-- MAIN SCREEN -->
  <section id="main-screen" class="hidden">
    <div class="game-area">

      <!-- Character display: all 5 clips stacked, crossfade between them -->
      <div id="character-container">
        <video class="character-clip is-active" data-clip="click-middle" src="assets/clips/clickmiddle.mp4" autoplay loop muted playsinline preload="auto" aria-label="Prussia"></video>
        <video class="character-clip" data-clip="click-left"   src="assets/clips/clickleft.mp4"   loop muted playsinline preload="auto" aria-hidden="true"></video>
        <video class="character-clip" data-clip="click-right"  src="assets/clips/clickright.mp4"  loop muted playsinline preload="auto" aria-hidden="true"></video>
        <video class="character-clip is-action" data-clip="drink-beer"  src="assets/clips/drinkbeer.mp4"  loop muted playsinline preload="auto" aria-hidden="true"></video>
        <video class="character-clip is-action" data-clip="write-diary" src="assets/clips/writediary.mp4" loop muted playsinline preload="auto" aria-hidden="true"></video>
        <button class="click-zone" data-action="click-left" aria-label="Poke Prussia on the left"></button>
        <button class="click-zone" data-action="click-middle" aria-label="Poke Prussia in the middle"></button>
        <button class="click-zone" data-action="click-right" aria-label="Poke Prussia on the right"></button>
        <div id="expression-label"></div>
      </div>

      <!-- Named action buttons -->
      <div class="action-bar">
        <button class="action-btn" data-action="drink-beer" aria-label="Prussia drinks beer">
          <span class="btn-icon">🍺</span>
          <span class="btn-text">Drink Beer</span>
        </button>
        <button class="action-btn" data-action="write-diary" aria-label="Prussia writes in his diary">
          <span class="btn-icon">📖</span>
          <span class="btn-text">Write Diary</span>
        </button>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
